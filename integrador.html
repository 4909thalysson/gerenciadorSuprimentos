<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="integrador.css">
    <title>Integrador</title>
    <link rel="icon" type="image/jpeg" href="assets\logoCambai.jpeg">

</head>
<header class="topo">
    <div class="titleMenu">
        <img src="assets/logoSuprimentos.png" alt="Logo Cambaí Sementes">
    </div>

    <button id="menu-toggle">☰</button>

    <nav id="menu">
        <a href="/printmap.html">
            <img src="assets/apps.png">PrintMap
        </a>
        <a href="/reserva.html">
            <img src="assets/warehouse-alt.png">Reserva
        </a>
        <a href="/registros.html">
            <img src="assets/deposit.png">Registros
        </a>
    </nav>

</header>

    <script>
        const toggle = document.getElementById("menu-toggle");
        const menu = document.getElementById("menu");

        toggle.addEventListener("click", () => {
            menu.classList.toggle("active");
        });
    </script>
<body>
    <div class="container">
        <div class="toolbar">
                <div class="search-bar">
                    <input type="text" id="input-search" placeholder="Pesquisar por impressora...">
                    <button type="button" id="btn-search">
                        <img src="assets/search.png" alt="Ícone de pesquisa" width="20" height="20">
                    </button>
                </div>
                <button class="btn-primary" onclick="gerarReservas()">Estoque completo</button>
                <button class="btn-primary" onclick="gerarRegistros()">Histórico de registros</button>
            </div>


            <div class="preview-section">
                <div class="email-preview">
                    <h2>Pré-visualização</h2>
                    <pre id="previewConteudo">Visualização do conteúdo do relatório antes do envio.</pre>
                </div>
                <div class="preview-actions">
                    <button class="btn-success" onclick="enviarEmail()">Enviar ao Pipefy</button>
                    <button class="btn-danger" onclick="limparTudo()">Limpar</button>
                </div>
            </div>
    <div>

    <form 
        id="formPipefy"
        action="https://formspree.io/f/xbdzgyqg"
        method="POST"
        style="display:none;"
    >
        <input type="email" name="email" id="emailRemetente">
        <textarea name="message" id="mensagemEmail"></textarea>

        <input type="hidden" name="_subject" value="Relatório Integrador Pipefy">
        <input type="hidden" name="_captcha" value="false">
    </form>

    <footer style="margin:80px 0 40px; text-align:center; color:#666; font-size:14.5px;">
    Sistema desenvolvido e mantido pela <strong>Equipe do GI</strong><br>
    Cambaí Sementes © 2026
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="integrador.js"></script>
</body>
</html>
