<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="printmap.css">
    <link rel="icon" type="image/jpeg" href="assets\logoCambai.jpeg">

    <title>printMap</title>
</head>
<header class="topo">
    <div class="titleMenu">
        <img src="assets/logoSuprimentos.png" alt="Logo Cambaí Sementes"> 
    </div>

    <button id="menu-toggle">☰</button>

    <nav id="menu">
        <a href="/reserva.html">
            <img src="assets/warehouse-alt.png" alt="">Reserva
        </a>
        <a href="/registros.html">
            <img src="assets/deposit.png">Registros
        </a>
        <a href="/integrador.html">
            <img src="assets/plug-connection.png">Integrador
        </a>
    </nav>

</header>

    <script>
        const toggle = document.getElementById("menu-toggle");
        const menu = document.getElementById("menu");

        toggle.addEventListener("click", () => {
            menu.classList.toggle("active");
        });
    </script>
<body>

    <div class="cards">
        <div class="card">
            Impressoras<br>
            <span id="totalImpressoras">0</span>
        </div>
        <div class="card">
            Suprimentos<br>
            <span id="totalSuprimentos">0</span>
        </div>
        <div class="card alert">
            Zerados<br>
            <span id="suprimentosZerados">0</span>
        </div>
    </div>

    <div class="card destaque">
        Top Suprimentos<br>
        <span id="topSuprimento">—</span>
    </div>

    <div class="titulo">
        <h1>Mapeamento de <strong>IMPRESSORAS</strong></h1>
    </div>


    <div class="filtros">

        <div class="grupo-filtros">
            <h2>Filtros:</h2>

            <select id="filtro-setor">
                <option value="">Todos os setores</option>
            </select>

            <select id="filtro-status">
                <option value="">Todos os status</option>
                <option value="uso">Em uso</option>
                <option value="manutencao">Manutenção</option>
                <option value="inativo">Inativo</option>
            </select>

            <select id="filtro-tipo">
                <option value="">Todos os tipos</option>
                <option value="locacao">Locação</option>
            </select>
        </div>

    </div>


    <div class="printmap" id="printmap"></div>

    <footer style="margin:80px 0 40px; text-align:center; color:#666; font-size:14.5px;">
    Sistema desenvolvido e mantido pela <strong>Equipe do GI</strong><br>
    Cambaí Sementes © 2026
    </footer>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="printmap.js"></script>

</body>
</html>
